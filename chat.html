<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Instinct+ — Чат</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="firebase-init.js"></script>
  <script src="notifications.js"></script>
</head>

<body class="chat-page">

<header class="topbar">
  <div class="topbar-left">
    <div class="notification-bell" onclick="toggleNotifications(event)">
      <button class="bell-icon">🔔</button>
      <span id="notificationBadge" class="notification-badge" style="display:none;">0</span>
    </div>
    <h1 class="site-title">Instinct+</h1>
  </div>

  <div class="topbar-actions-right">
    <button class="btn topbar-btn" onclick="location.href='home.html'">Головна</button>
    <button class="btn topbar-btn" onclick="location.href='profile.html'">Профіль</button>
    <button class="btn topbar-btn" onclick="location.href='settings.html'">⚙️ Налаштування</button>
    <button class="btn logout" onclick="logout()">Вийти</button>
  </div>

  <div id="notificationsDropdown" class="notifications-dropdown">
    <div style="padding:12px; font-weight:bold; border-bottom:1px solid #2b2b2b;">📢 Сповіщення</div>
    <div id="notificationsList" style="max-height:350px; overflow-y:auto;"></div>
  </div>
</header>

<div class="chat-container">

  <!-- ЛЕВАЯ ПАНЕЛЬ -->
  <div class="matches-list">
    <h3>💬 Чати</h3>
    <div id="matchesList" class="matches-items"></div>
  </div>

  <!-- ПРАВАЯ ПАНЕЛЬ -->
  <div class="chat-area" id="chatArea">

    <div class="chat-topbar">
      <div class="chat-info">
        <img id="chatAvatar" class="chat-avatar" src="img/user.png">
        <div class="chat-header-text">
          <h4 id="chatNickname">Оберіть чат</h4>
          <div style="display: flex; align-items: center; gap: 5px;">
            <span id="chatStatusDot" style="width: 10px; height: 10px; border-radius: 50%; background: #9e9e9e; display: inline-block;"></span>
            <span id="chatStatusText" style="font-size: 12px; color: #666;">Офлайн</span>
          </div>
        </div>
      </div>
    </div>

    <div id="messagesContainer" class="messages-container empty">
      <p>💬 Виберіть чат, щоб розпочати спілкування</p>
    </div>

    <div class="chat-footer">
      <input id="msg" placeholder="Напишіть повідомлення..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()" class="send-btn">→</button>
    </div>

  </div>
</div>

<script src="chat.js"></script>

<script>
// Инициализация онлайна для текущего пользователя
auth.onAuthStateChanged(user => {
  if (user && typeof initOnlineStatus === 'function') {
    initOnlineStatus(user.uid);
  }
});

// Функция для обновления статуса в шапке чата
function updateChatStatus(userId) {
  if (!userId) return;
  
  const statusDot = document.getElementById('chatStatusDot');
  const statusText = document.getElementById('chatStatusText');
  
  if (typeof subscribeToUserStatus === 'function') {
    subscribeToUserStatus(userId, (isOnline) => {
      if (statusDot) {
        statusDot.style.backgroundColor = isOnline ? '#44b700' : '#9e9e9e';
      }
      if (statusText) {
        statusText.textContent = isOnline ? 'Онлайн' : 'Офлайн';
        statusText.style.color = isOnline ? '#44b700' : '#666';
      }
    });
  }
}

// Переопределяем открытие чата для добавления статуса
const originalSelectChat = window.selectChat;
if (originalSelectChat) {
  window.selectChat = function(chatId, otherUserId, otherUserNickname, otherUserAvatar) {
    originalSelectChat(chatId, otherUserId, otherUserNickname, otherUserAvatar);
    updateChatStatus(otherUserId);
  };
}

// Дополнительная функция для отправки сообщений с уведомлениями
window.sendMessage = async function() {
  const msgInput = document.getElementById("msg");
  const text = msgInput ? msgInput.value.trim() : "";
  if (!text) return;
  
  const currentChatId = window.currentChatId;
  const currentChatWith = window.currentChatWith;
  
  if (!currentChatId || !currentChatWith) {
    console.log("Чат не выбран");
    return;
  }
  
  try {
    await db.ref(`messages/${currentChatId}/items`).push({
      text: text,
      from: auth.currentUser.uid,
      createdAt: Date.now()
    });
    
    msgInput.value = "";
    
    setTimeout(() => {
      const container = document.getElementById("messagesContainer");
      if (container) container.scrollTop = container.scrollHeight;
    }, 100);
    
    if (currentChatWith !== auth.currentUser.uid && typeof sendNotification === 'function') {
      await sendNotification(currentChatWith, 'message', auth.currentUser.uid, null, text);
    }
    
    console.log("✅ Сообщение отправлено");
  } catch(error) {
    console.error("Ошибка отправки:", error);
    alert("Ошибка: " + error.message);
  }
};
</script>

</body>
</html>
