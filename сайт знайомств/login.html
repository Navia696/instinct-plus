<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Instinct+ — Вхід</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="firebase-init.js"></script>
</head>

<body class="auth-page login-page" style="visibility:hidden">

<div class="inner-bg"></div>

<div class="form-box">
  <h2>Вхід</h2>
  <label for="email">Email</label>
  <input id="email" type="email" placeholder="Email">
  <label for="password">Пароль</label>
  <input id="password" type="password" placeholder="Пароль">
  <div class="checkbox-group">
    <label><input id="rememberMe" type="checkbox"> Запам’ятати мене</label>
  </div>
  <button id="loginBtn" class="btn full" onclick="login()">Увійти</button>
  <p id="signedInMessage" class="small info-message"></p>
  <p class="small">Ще нема акаунту? <a href="register.html">Зареєструватися</a></p>
</div>

<script>
  window.addEventListener("unload", function() {});

  function checkAuthAndRedirect() {
    if (auth.currentUser) {
      location.replace("home.html");
      return;
    }
    if (!document.body.style.visibility || document.body.style.visibility === "hidden") {
      document.body.style.visibility = "visible";
    }
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      location.replace("home.html");
      return;
    }
    document.body.style.visibility = "visible";
  });

  document.addEventListener("DOMContentLoaded", () => {
    const savedEmail = localStorage.getItem("lastEmail");
    const emailInput = document.getElementById("email");
    const rememberMe = document.getElementById("rememberMe");

    if (savedEmail && emailInput) {
      emailInput.value = savedEmail;
      if (rememberMe) rememberMe.checked = true;
    }
  });

  window.addEventListener("pageshow", event => {
    if (event.persisted || auth.currentUser) {
      checkAuthAndRedirect();
    }
  });

  window.addEventListener("popstate", checkAuthAndRedirect);
  window.addEventListener("load", checkAuthAndRedirect);

  function login() {
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const rememberMe = document.getElementById("rememberMe");
    const emailValue = emailInput.value.trim();

    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
      .then(() => {
        return auth.signInWithEmailAndPassword(emailValue, passwordInput.value);
      })
      .then(() => {
        if (rememberMe && rememberMe.checked) {
          localStorage.setItem("lastEmail", emailValue);
        } else {
          localStorage.removeItem("lastEmail");
        }
        location.replace("home.html");
      })
      .catch(err => {
        if (err.code === "auth/configuration-not-found") {
          alert("Firebase: включите Email/Password в Firebase Console -> Authentication -> Sign-in method.");
        } else {
          alert(err.message);
        }
      });
  }
</script>

</body>
</html>
