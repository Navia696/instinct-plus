<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Instinct+ — Пошук</title>
  <link rel="stylesheet" href="style.css">
  <style>
   
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="firebase-init.js"></script>
  <script src="notifications.js"></script>

<body class="search-page">

<div class="inner-bg"></div>

<header class="topbar">
  <div class="topbar-left">
    <div class="notification-bell" onclick="toggleNotifications(event)">
      <button class="bell-icon">🔔</button>
      <span id="notificationBadge" class="notification-badge" style="display:none;">0</span>
    </div>
    <h1 class="site-title">Instinct+</h1>
  </div>

  <div class="topbar-actions-right">
     <button class="btn topbar-btn" onclick="location.href='home.html'">Головна</button>
    <button class="btn topbar-btn" onclick="location.href='profile.html'">Профіль</button>
    <button class="btn logout" onclick="logout()">Вийти</button>
  </div>
  
  <div id="notificationsDropdown" class="notifications-dropdown">
    <div style="padding:10px; font-weight:bold; border-bottom:1px solid #ddd;">📢 Сповіщення</div>
    <div id="notificationsList"></div>
  </div>
</header>

<div class="search-content">
  <h2>🔍 Пошук людей</h2>

  <div class="filters">
    <div class="filter-group">
      <label>Від 12✨</label>
      <input id="minAge" type="number" min="12" max="70" value="12" placeholder="12">
    </div>
    <div class="filter-group">
      <label>До 70✨</label>
      <input id="maxAge" type="number" min="12" max="70" value="70" placeholder="70">
    </div>
    <div class="filter-group">
      <label>Місто 📍</label>
      <input id="city" type="text" placeholder="Місто" list="city-suggestions">
    </div>
    <button onclick="applyFilters()">🔍 Фільтрувати</button>
  </div>
  
  <div id="ageWarning" class="age-warning-message"></div>
  
  <datalist id="city-suggestions"></datalist>

  <div id="card" class="tinder-card"></div>
</div>

<script>
  let currentUser;
  let users = [];
  let allUsers = [];
  let index = 0;
  let notifications = [];
  
  const minAge = document.getElementById('minAge');
  const maxAge = document.getElementById('maxAge');
  const city = document.getElementById('city');
  const citySuggestions = document.getElementById('city-suggestions');
  const card = document.getElementById('card');
  const ageWarning = document.getElementById('ageWarning');

  auth.onAuthStateChanged(async user => {
    if (!user) location.href = "login.html";
    currentUser = user;
    
    // Инициализация уведомлений
    if (typeof initNotifications === 'function') {
      initNotifications(user.uid);
    }
    
    await loadUsers();
    startNotificationListeners();
    showUser();
    
    minAge.placeholder = "12";
    maxAge.placeholder = "70";
  });

  function validateAge(value, field) {
    let num = Number(value);
    if (isNaN(num)) return field === 'min' ? 12 : 70;
    if (field === 'min') {
      if (num < 12) {
        ageWarning.textContent = "⚠️ Вік не може бути менше 12 років!";
        ageWarning.style.display = "block";
        setTimeout(() => { ageWarning.style.display = "none"; }, 3000);
        return 12;
      }
    }
    if (field === 'max') {
      if (num > 70) {
        ageWarning.textContent = "⚠️ Вік не може бути більше 70 років!";
        ageWarning.style.display = "block";
        setTimeout(() => { ageWarning.style.display = "none"; }, 3000);
        return 70;
      }
      if (num < 12) return 12;
    }
    ageWarning.style.display = "none";
    return num;
  }

  function applyFilters() {
    let min = validateAge(minAge.value, 'min');
    let max = validateAge(maxAge.value, 'max');
    
    if (min > max) {
      [min, max] = [max, min];
    }
    
    minAge.value = min;
    maxAge.value = max;
    
    let cityFilter = city.value.trim().toLowerCase();
    cityFilter = cityFilter.replace(/[^\w\sа-яіїєґ]/gi, '');
    
    const filtered = allUsers.filter(u => {
      const age = Number(u.age) || 0;
      let userCity = (u.city || "").toLowerCase();
      userCity = userCity.replace(/[^\w\sа-яіїєґ]/gi, '');
      
      const cityMatch = cityFilter === "" || userCity.includes(cityFilter);
      
      return age >= min && age <= max && cityMatch;
    });

    users = filtered;
    index = 0;
    showUser();
  }

  function populateCitySuggestions(allUsers) {
    const citySet = new Set();
    allUsers.forEach(user => {
      const cityName = (user.city || "").trim();
      if (cityName) citySet.add(cityName);
    });
    
    citySuggestions.innerHTML = "";
    Array.from(citySet).sort().forEach(cityName => {
      const option = document.createElement('option');
      option.value = cityName;
      citySuggestions.appendChild(option);
    });
  }

  async function loadUsers() {
    const snap = await db.ref('users').once('value');
    const all = snap.val() || {};
    allUsers = Object.keys(all)
      .filter(id => id !== currentUser.uid)
      .map(id => ({ id, ...all[id] }));
    
    allUsers.forEach(u => {
      if (!u.age) u.age = 0;
    });
    
    populateCitySuggestions(allUsers);
    users = [...allUsers];
  }

  function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function showUser() {
    if (index >= users.length) {
      card.innerHTML = `
        <div class="no-users">
          <h3>😔 Більше людей немає</h3>
          <p>Спробуйте змінити фільтри</p>
        </div>
      `;
      return;
    }

    const u = users[index];
    
    card.innerHTML = `
      <img class="avatar" src="${u.avatar || 'img/user.png'}" onerror="this.src='img/user.png'">
      <h3>${escapeHtml(u.nickname || 'Користувач')}</h3>
      <p>🎂 Вік: ${u.age || '—'}</p>
      <p>📍 Місто: ${u.city || '—'}</p>
      <p>💡 Інтереси: ${u.interests || '—'}</p>
      <p>📝 Про себе: ${u.bio || '—'}</p>
      <div class="buttons">
        <button onclick="swipeLeft()">👎</button>
        <button onclick="swipeRight()">❤️</button>
      </div>
    `;
  }

  function swipeLeft() {
    index++;
    showUser();
  }

  async function swipeRight() {
    const target = users[index];
    if (!target) return;
    
    await db.ref(`likes_sent/${currentUser.uid}/${target.id}`).set({
      userId: target.id,
      timestamp: Date.now()
    });
    
    await checkMatch(target.id);
    index++;
    showUser();
  }

  async function checkMatch(targetId) {
    const targetUser = users[index];
    const targetNickname = targetUser?.nickname || 'Користувач';
    
    const snap = await db.ref(`likes_sent/${targetId}/${currentUser.uid}`).once('value');
    
    if (snap.exists()) {
      const matchId = [currentUser.uid, targetId].sort().join("_");
      
      await db.ref(`matches/${matchId}`).set({
        users: [currentUser.uid, targetId],
        createdAt: Date.now()
      });
      
      // ✅ УВЕДОМЛЕНИЕ О МЭТЧЕ через sendNotification
      if (typeof sendNotification === 'function') {
        await sendNotification(targetId, 'match', currentUser.uid);
        await sendNotification(currentUser.uid, 'match', targetId);
      }
      
      alert("🎉 У вас MATCH! 🎉");
      location.href = "chat.html";
    } else {
      // ✅ УВЕДОМЛЕНИЕ О ЛАЙКЕ через sendNotification
      if (typeof sendNotification === 'function') {
        await sendNotification(targetId, 'like', currentUser.uid);
      }
    }
  }

  function startNotificationListeners() {
    db.ref(`likes_sent/${currentUser.uid}`).on('child_added', () => {
      // Обновляем через notifications.js
      if (typeof loadNotifications === 'function') {
        // loadNotifications автоматически сработает через initNotifications
      }
    });
  }
  
  // Функция для обновления UI уведомлений (использует notifications.js)
  function toggleNotifications(event) {
    event.stopPropagation();
    const dropdown = document.getElementById('notificationsDropdown');
    if (dropdown) {
      dropdown.classList.toggle('show');
    }
  }
  
  document.addEventListener('click', (e) => {
    const dropdown = document.getElementById('notificationsDropdown');
    const bell = document.querySelector('.notification-bell');
    if (bell && dropdown && !bell.contains(e.target) && dropdown.classList.contains('show')) {
      dropdown.classList.remove('show');
    }
  });
</script>

</body>
</html>
